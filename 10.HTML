<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>NEON PULSE ONLINE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #050507; --p1-color: #00f2ff; --p2-color: #ff007b; --cell-bg: #111317; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(0, 0, 0, 0.9); padding: 25px; border-radius: 24px; border: 1px solid #333; width: 380px; text-align: center; }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: 4px; background: linear-gradient(45deg, var(--p1-color), var(--p2-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Menu */
        .menu-btn { background: white; color: black; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Game UI */
        .scoreboard { display: flex; justify-content: space-between; margin: 15px 0; gap: 10px; }
        .player-box { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #222; background: #0a0a0c; }
        .active { border-color: yellow; box-shadow: 0 0 10px rgba(255,255,0,0.2); }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; background: #1a1d22; padding: 5px; border-radius: 10px; }
        .cell { width: 55px; height: 55px; background: var(--cell-bg); border-radius: 5px; display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .atom { width: 14px; height: 14px; border-radius: 50%; position: absolute; transition: 0.3s; }
        .p1-atom { background: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); }
        .p2-atom { background: var(--p2-color); box-shadow: 0 0 10px var(--p2-color); }
        .status { font-size: 0.8rem; color: #888; margin: 10px 0; min-height: 1.2rem; }
        #online-info { background: #1a1a1a; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>NEON PULSE</h1>
        <p style="color:#555; font-size:0.7rem;">VERSION MULTIJOUEUR ONLINE</p>
        
        <button class="menu-btn" onclick="hostGame()">CRÉER UNE PARTIE</button>
        
        <div style="margin: 15px 0; color: #333;">─── OU ───</div>
        
        <input type="text" id="join-id" placeholder="Entrer l'ID de votre ami">
        <button class="menu-btn" style="background: #222; color: white;" onclick="joinGame()">REJOINDRE</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div id="online-info">Votre ID : <b id="display-id" style="color:yellow">...</b></div>
        
        <div class="scoreboard">
            <div id="box-1" class="player-box">
                <div style="font-size:0.6rem;">JOUEUR 1 (HÔTE)</div>
                <div id="score-1" style="font-size:1.2rem;">0</div>
            </div>
            <div id="box-2" class="player-box">
                <div style="font-size:0.6rem;">JOUEUR 2 (INVITÉ)</div>
                <div id="score-2" style="font-size:1.2rem;">0</div>
            </div>
        </div>

        <div id="status" class="status">En attente de connexion...</div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<script>
    let peer, conn;
    let myRole = null; // 'host' ou 'guest'
    let board = [], gameActive = false, currentPlayer = 1;
    const ROWS = 6, COLS = 6;

    // --- INITIALISATION RÉSEAU ---

    function hostGame() {
        myRole = 'host';
        initPeer();
    }

    function joinGame() {
        const id = document.getElementById('join-id').value;
        if (!id) return alert("Entrez l'ID !");
        myRole = 'guest';
        initPeer(id);
    }

    function initPeer(targetId = null) {
        // PeerJS gratuit (utilise leur serveur public pour le signalement)
        peer = new Peer('pulse-' + Math.floor(Math.random()*10000));
        
        peer.on('open', (id) => {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('online-info').style.display = 'block';
            document.getElementById('display-id').textContent = id;
            
            if (targetId) {
                conn = peer.connect(targetId);
                setupConnListeners();
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnListeners();
            document.getElementById('status').textContent = "Ami connecté ! Partie lancée.";
            startGame();
        });
    }

    function setupConnListeners() {
        conn.on('open', () => {
            document.getElementById('status').textContent = "Connecté !";
            if (myRole === 'guest') startGame();
        });
        conn.on('data', (data) => {
            if (data.type === 'move') {
                handleRemoteMove(data.r, data.c);
            }
        });
    }

    // --- LOGIQUE DU JEU ---

    function startGame() {
        createGrid();
        gameActive = true;
        updateUI();
    }

    function createGrid() {
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                board[r][c] = { owner: 0, count: 0 };
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                cell.onclick = () => localMove(r, c);
                gridEl.appendChild(cell);
            }
        }
    }

    function localMove(r, c) {
        if (!gameActive) return;
        // Vérifier si c'est mon tour
        const myTurn = (myRole === 'host' && currentPlayer === 1) || (myRole === 'guest' && currentPlayer === 2);
        if (!myTurn) return;
        if (board[r][c].owner !== 0 && board[r][c].owner !== currentPlayer) return;

        conn.send({ type: 'move', r, c });
        handleMove(r, c);
    }

    function handleRemoteMove(r, c) {
        handleMove(r, c);
    }

    async function handleMove(r, c) {
        await addPoint(r, c, currentPlayer);
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateUI();
        checkWinner();
    }

    async function addPoint(r, c, player) {
        let cell = board[r][c];
        cell.owner = player;
        cell.count++;
        drawCell(r, c);
        if (cell.count >= getLimit(r, c)) await explode(r, c, player);
    }

    function getLimit(r, c) {
        if ((r === 0 || r === ROWS-1) && (c === 0 || c === COLS-1)) return 2;
        if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) return 3;
        return 4;
    }

    async function explode(r, c, player) {
        board[r][c].count = 0; board[r][c].owner = 0;
        drawCell(r, c);
        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
        for (let [dr, dc] of dirs) {
            let nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                await new Promise(res => setTimeout(res, 100));
                await addPoint(nr, nc, player);
            }
        }
    }

    function drawCell(r, c) {
        const el = document.getElementById(`cell-${r}-${c}`);
        const data = board[r][c];
        el.innerHTML = '';
        for (let i = 0; i < data.count; i++) {
            const atom = document.createElement('div');
            atom.className = `atom ${data.owner === 1 ? 'p1-atom' : 'p2-atom'}`;
            const offset = [[20,20], [10,20], [30,20], [20,10], [20,30]];
            atom.style.top = offset[i][0] + 'px'; atom.style.left = offset[i][1] + 'px';
            el.appendChild(atom);
        }
    }

    function updateUI() {
        document.getElementById('box-1').classList.toggle('active', currentPlayer === 1);
        document.getElementById('box-2').classList.toggle('active', currentPlayer === 2);
        const myTurn = (myRole === 'host' && currentPlayer === 1) || (myRole === 'guest' && currentPlayer === 2);
        document.getElementById('status').textContent = myTurn ? "À VOUS DE JOUER" : "ATTENTE DE L'AMI...";
    }

    function checkWinner() {
        let players = new Set();
        let total = 0;
        board.flat().forEach(c => { if(c.owner !== 0) { players.add(c.owner); total += c.count; }});
        if (total > 1 && players.size === 1) {
            gameActive = false;
            const winner = [...players][0];
            document.getElementById('status').innerHTML = `<b style="color:yellow">VICTOIRE DU JOUEUR ${winner} !</b>`;
        }
    }
</script>
</body>
</html>
